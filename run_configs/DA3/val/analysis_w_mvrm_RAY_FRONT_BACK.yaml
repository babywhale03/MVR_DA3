# DepthAnything3 Benchmark Evaluation Configuration
# 
# This config can be loaded and overridden via command line.
# Example: python -m depth_anything_3.bench.evaluator --model /path/to/model --work_dir /path/to/workspace
#
# See depth_anything_3.cfg for config utility functions.


# ==============================================================================
# MVRM Configuration
# ==============================================================================
MVRM_EVAL:
  # [wo_mvrm_HQ, wo_mvrm_LQ, wo_mvrm_IR, w_mvrm]
  eval_method: w_mvrm_front_back
  load_lq: true
  load_res: true


# ==============================================================================
# Denoiser Configuration
# ==============================================================================
denoiser:
  model: DiTwDDTHeadMVRM_Multiview
  target: RAE.src.stage2.models.DDT_MVRM_multiview.DiTwDDTHeadMVRM_Multiview
  params:
    # input_size: [27, 36]  # feat_H, feat_W
    input_size: 
    patch_size: 1
    in_channels: 1536
    hidden_size: [1536, 3072]
    depth: [28, 2]
    num_heads: [16, 16]
    mlp_ratio: 4.0
    class_dropout_prob:
    num_classes: 
    use_qknorm: true 
    use_swiglu: true
    use_rope: true
    use_rmsnorm: true
    wo_shift: false
    use_pos_embed: false
    use_global_residual: false
  # JIHYE2 (lqkernel50,100,200-74k)
  # ckpt: /media/data1/MV_Restoration/JIHYE2_CKPT/da3/lqkernel50/kernel50_0074000.pt
  # ckpt: /media/data1/MV_Restoration/JIHYE2_CKPT/da3/lqkernel100/kernel100_0074000.pt
  ckpt: /media/data1/MV_Restoration/JIHYE2_CKPT/da3/lqkernel200/kernel200_0074000.pt

  # JIHYE3 (lqkernel200 - g17 - 118k)
  # ckpt: /media/data1/MV_Restoration/JIHYE3_CKPT/ep-0118000_g17_200.pt


mvrm:
  lq_latent_cond: addition    # [addition, concat]
  train:
    # DPT Head input feats = [19, 27, 33, 39]
    extract_feat_layers: [17, 31]
    concat_feat: False
    break_and_return_feat: false
  val:
    restore_feat_layers: [17, 31]
    concat_feat: False 
    skip_and_input_feat: false


denoiser2:
  model: DiTwDDTHeadMVRM_Multiview
  target: RAE.src.stage2.models.DDT_MVRM_multiview.DiTwDDTHeadMVRM_Multiview
  params:
    # input_size: [27, 36]  # feat_H, feat_W
    input_size: 
    patch_size: 1
    in_channels: 1536
    hidden_size: [1536, 3072]
    depth: [28, 2]
    num_heads: [16, 16]
    mlp_ratio: 4.0
    class_dropout_prob:
    num_classes: 
    use_qknorm: true 
    use_swiglu: true
    use_rope: true
    use_rmsnorm: true
    wo_shift: false
    use_pos_embed: false
    use_global_residual: false
  # JIHYE3 (lqkernel200 - g31 - 118k)
  ckpt: /media/data1/MV_Restoration/JIHYE3_CKPT/ep-0117000_g31_200.pt


transport:
  params:
    path_type: 'Linear'
    prediction: 'velocity'
    loss_weight: null
    time_dist_type: 'logit-normal_0_1'
sampler:
  mode: ODE
  params:
    sampling_method: 'euler'
    num_steps: 50
    atol: 1.0e-6
    rtol: 1.0e-3
    reverse: false
misc:
  latent_size: 
  num_classes: 
  time_dist_shift_dim: 1492992  # 1536*27*36
  time_dist_shift_base: 4096

# ==============================================================================
# Model Configuration
# ==============================================================================
model:
  # Path to model checkpoint or HuggingFace model ID
  path: depth-anything/DA3-GIANT-1.1
  use_ray_pose: true

