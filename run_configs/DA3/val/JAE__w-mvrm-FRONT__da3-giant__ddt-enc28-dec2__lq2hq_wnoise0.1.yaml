# DepthAnything3 Benchmark Evaluation Configuration
# 
# This config can be loaded and overridden via command line.
# Example: python -m depth_anything_3.bench.evaluator --model /path/to/model --work_dir /path/to/workspace
#
# See depth_anything_3.cfg for config utility functions.


# ==============================================================================
# MVRM Configuration
# ==============================================================================
MVRM_EVAL:
  # [wo_mvrm_HQ, wo_mvrm_LQ, wo_mvrm_IR, w_mvrm]
  eval_method: w_mvrm
  load_lq: true
  load_res: true


# ==============================================================================
# Denoiser Configuration
# ==============================================================================
denoiser:
  model: DiTwDDTHeadMVRM_Multiview
  target: RAE.src.stage2.models.DDT_MVRM_multiview.DiTwDDTHeadMVRM_Multiview
  params:
    # input_size: [27, 36]  # feat_H, feat_W
    input_size: 
    patch_size: 1
    in_channels: 1536
    hidden_size: [1536, 3072]
    
    depth: [28, 2]
    
    num_heads: [16, 16]
    mlp_ratio: 4.0
    class_dropout_prob:
    num_classes: 
    use_qknorm: true 
    use_swiglu: true
    use_rope: true
    use_rmsnorm: true
    wo_shift: false
    use_pos_embed: false
    use_global_residual: false
  # ckpt: result_train/nips26/multi_view/260318/hypersim/TRAIN__fp32__hypersim__near_camera-near_random__da3-GIANT-extractfeat17-mvrm__bs1-maxview8-accum1__lr-2e-04__msg-lqkernel200__ema95__hyp1__ddt-enc28-1536-dec2-3072__lqdrop01_re/checkpoints/ep-0015000.pt
  # ckpt: /mnt/dataset1/jaeeun/nips26/MVR/result_train/nips26/multi_view/260402_test_lq2hq_wnoise/hypersim/TRAIN__fp32__hypersim__near_camera-near_random__da3-GIANT-extractfeat17-mvrm__bs1-maxview8-accum1__lr-2e-04__msg-lqkernel200__ema95__hyp1__ddt-enc28-1536-dec2-3072__lqdrop01_re__concat__lq2hq_wnoise/checkpoints/ep-0015000.pt
  ckpt: /mnt/dataset1/jaeeun/nips26/MVR/result_train/nips26/multi_view/260402_test_lq2hq_wnoise/hypersim/TRAIN__fp32__hypersim__near_camera-near_random__da3-GIANT-extractfeat17-mvrm__bs1-maxview8-accum1__lr-2e-04__msg-lqkernel200__ema95__hyp1__ddt-enc28-1536-dec2-3072__lqdrop01_re__concat__lq2hq_wnoise/checkpoints/ep-0025000.pt

mvrm:
  noiselvl: 0.1
  lq_latent_cond: addition    # [addition, concat]
  train:
    # DPT Head input feats = [19, 27, 33, 39]
    extract_feat_layers: [17]
    # extract_feat_layers: [31]
    # extract_feat_layers: [39]
    concat_feat: False
    break_and_return_feat: false
  val:
    restore_feat_layers: [17]
    # restore_feat_layers: [31]
    # restore_feat_layers: [39]
    concat_feat: False 
    skip_and_input_feat: false
    guidance:
      use_cfg: false
      cfg_scale: 1.0

      # use_cfg: true
      # cfg_scale: 2.0

      # use_cfg: true
      # cfg_scale: 4.0


transport:
  params:
    path_type: 'Linear'
    prediction: 'velocity'
    loss_weight: null
    time_dist_type: 'logit-normal_0_1'
sampler:
  mode: ODE
  params:
    sampling_method: 'euler'
    num_steps: 50
    atol: 1.0e-6
    rtol: 1.0e-3
    reverse: false
misc:
  latent_size: 
  num_classes: 
  time_dist_shift_dim: 1492992  # 1536*27*36
  time_dist_shift_base: 4096

