        # [random, near_random]
        # strategy: random
        strategy: near_random 
        expand_ratio: 4
      process_res: 504
      patch_size: 14


  val:
    image_size: 
    max_num_input_view: 
    list: []
    eth3d:
      num_eval_img: 
      eval_scene: 
      ann_path:
      hq_root_path: 
      lq_root_path: 
      view_selection:
        strategy: 
        expand_ratio:
    hypersim:
      num_eval_img: 
      ann_path: 
      hq_root_path:
      lq_kernel_size: 
      view_selection:
        strategy: 
        expand_ratio: 
      process_res: 
      patch_size:



mvrm:
  lq_latent_cond: addition    # [addition, concat]
  train:
    # DPT Head input feats = [19, 27, 33, 39]
    extract_feat_layers: [17]
    concat_feat: False
    break_and_return_feat: false
  val:
    restore_feat_layers: [17]
    concat_feat: False 
    skip_and_input_feat: false
    guidance:
      use_cfg: false
      cfg_scale: 1.0


  loss:
    velocity_direction:
      use: false
      # lambda_coeff: 0.05
      lambda_coeff: 0.1
    camera_pose:
      use: true 
      lambda_coeff: 1.0
    cam_tkn_weight: 1.0
