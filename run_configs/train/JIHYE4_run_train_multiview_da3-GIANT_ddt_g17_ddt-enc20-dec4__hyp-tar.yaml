stage_1:
  model: da3
  model_size: GIANT
  rae:
    target: 
    params:
      encoder_cls: 
      encoder_config_path: 
      encoder_input_size: 
      encoder_params: 
      decoder_config_path: 
      pretrained_decoder_path: 
      noise_tau: 
      reshape_to_2d: 
      normalization_stat_path: 
  da3:
    ckpt: depth-anything/DA3-GIANT-1.1
  vggt:
    ckpt: facebook/VGGT-1B


stage_2:
  model: mvrm
  target: stage2.models.DDT_MVRM_multiview.DiTwDDTHeadMVRM_Multiview
  params:
    # input_size: [27, 36]  # feat_H, feat_W
    input_size: 
    patch_size: 1
    in_channels: 1536
    


    # hidden_size: [1536, 3072]
    # depth: [28, 2]

    hidden_size: [1536, 3072]
    depth: [20, 4]

    # hidden_size: [1536, 3072]
    # depth: [12, 6]



    num_heads: [16, 16]
    mlp_ratio: 4.0
    class_dropout_prob:
    num_classes: 
    use_qknorm: true 
    use_swiglu: true
    use_rope: true
    use_rmsnorm: true
    wo_shift: false
    use_pos_embed: false
    use_global_residual: false
  ckpt: 


transport:
  params:
    path_type: 'Linear'
    prediction: 'velocity'
    loss_weight: null
    time_dist_type: 'logit-normal_0_1'


sampler:
  mode: ODE
  params:
    sampling_method: 'euler'
    num_steps: 50
    atol: 1.0e-6
    rtol: 1.0e-3
    reverse: false


guidance:
  method: 'cfg'
  scale: 1.0
  t_min: 0.0
  t_max: 1.0


misc:
  latent_size: 
  num_classes: 
  time_dist_shift_dim: 1492992  # 1536*27*36
  time_dist_shift_base: 4096


training:
  global_seed: 42
  precision: fp32
  epochs: 10
 
  global_batch_size: 2
  grad_accum_steps: 1
  ema_decay: 0.9995
  # ema_decay: 0.9999
  num_workers: 4
  shuffle: true
  log_interval: 1

  ckpt_step_interval: 1000   # 1k

  vis:
    train_depth_every: -1
    val_depth_every: -1


  clip_grad: 1.0
  optimizer:
    lr: 2.0e-4
    betas: [0.9, 0.95]
    weight_decay: 0.0
  scheduler:
    type: linear
    warmup_epochs: 5
    decay_end_epoch: 10
    base_lr: 2e-4
    final_lr: 2e-5
    warmup_from_zero: false

  guidance:
    lq_drop: 0.1

  



log:
  result_root_dir: result_train/nips26/multi_view/JIHYE4/g17__ddt-enc20-dec4__hyp-tar
  tracker:
    name: 
    wandb:
      key: 
      entity: 
      project: 
      msg: 'jihye4_lqkernel200__ema95__hyp1tar1__ddt-enc20-1536-dec4-3072__lqdrop01'
      
      
      
        

