data:
  train:
    image_size: 512 
    max_num_input_view: 4
    list: [hypersim,]
    # list: [tartanair,]
    # list: [hypersim, tartanair,]
    
    hypersim:
      ann_path: metadata_images_split_scene_v1.csv
      hq_root_path: /mnt/dataset1/MV_Restoration/hypersim/data
      lq_kernel_size: [50, 300]
      lq_kernel_intensity: [0.0, 0.3]
      view_selection:
        # [random, near_random, near_camera]
        # strategy: random
        # strategy: near_random
        strategy: near_camera
        expand_ratio: 2
      process_res: 504
      patch_size: 14
      
    tartanair:
      ann_path: 
      hq_root_path: /mnt/dataset1/MV_Restoration/tartanair/data
      lq_kernel_size: [50, 300]
      lq_kernel_intensity: [0.0, 0.3]
      view_selection:
        # [random, near_random]
        # strategy: random
        strategy: near_random 
        expand_ratio: 4
      process_res: 504
      patch_size: 14


  val:
    image_size: 512 
    max_num_input_view: 6
    # list: []
    # list: [eth3d]
    list: []


    eth3d:
      num_eval_img: 5
      # eval_scene: [courtyard]
      # eval_scene: [courtyard,  electro,  facade,  kicker,  office,  playground]
      eval_scene: [courtyard, delivery_area,  electro,  facade,  kicker,  office,  pipes,  playground,  relief,  relief_2,  terrains]
      ann_path:
      hq_root_path: /mnt/dataset1/MV_Restoration/da3_benchmark_dataset/clean/eth3d
      lq_root_path: /mnt/dataset1/MV_Restoration/da3_benchmark_dataset/cam_blur_300/eth3d
      view_selection:
        strategy: near_random
        expand_ratio: 2
    
    
    hypersim:
      num_eval_img: 10
      ann_path: metadata_images_split_scene_v1.csv
      hq_root_path: /mnt/dataset1/MV_Restoration/hypersim/data
      lq_kernel_size: 200
      lq_kernel_intensity: 0.1
      view_selection:
        # [random, near_random, near_camera]
        # strategy: random
        # strategy: near_random
        strategy: near_camera
        expand_ratio: 2
      process_res: 504
      patch_size: 14



mvrm:
  noiselvl: 0.1
  lq_latent_cond: addition   # [addition, concat]
  train:
    # DPT Head input feats = [19, 27, 33, 39]
    extract_feat_layers: [17]
    concat_feat: False
    break_and_return_feat: false
  val:
    restore_feat_layers: [17]
    concat_feat: False 
    skip_and_input_feat: false
    guidance:
      use_cfg: false
      cfg_scale: 1.0


  loss:
    velocity_direction:
      use: false
      # lambda_coeff: 0.05
      lambda_coeff: 0.1
    camera_pose:
      use: true 
      lambda_coeff: 1.0
    cam_tkn_weight: 1.0
