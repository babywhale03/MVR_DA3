stage_1:
  model: vae
  # model_size: "SD21"
  # model_size: "SD3"
  model_size: "Flux"
  rae:
    target: 
    params:
      encoder_cls: 
      encoder_config_path: 
      encoder_input_size: 
      encoder_params: 
      decoder_config_path: 
      pretrained_decoder_path: 
      noise_tau: 
      reshape_to_2d: 
      normalization_stat_path: 
  da3:
    ckpt: depth-anything/DA3-GIANT-1.1
  vggt:
    ckpt: facebook/VGGT-1B
  vae:
    # ckpt: Manojb/stable-diffusion-2-1-base
    # ckpt: stabilityai/stable-diffusion-3.5-medium
    ckpt: black-forest-labs/FLUX.2-dev


stage_2:
  model: mvrm
  target: stage2.models.DDT_MVRM_multiview_flux.DiTwDDTHeadMVRM_Multiview_Flux
  params:
    # input_size: [27, 36]  # feat_H, feat_W
    input_size: 
    patch_size: 2
    in_channels: 32
    hidden_size: [1536, 3072]
    # hidden_size: [1024, 2048]
    # hidden_size: [32, 64]
    depth: [8, 6]
    num_heads: [16, 16]
    mlp_ratio: 4.0
    class_dropout_prob:
    num_classes: 
    use_qknorm: true 
    use_swiglu: true
    use_rope: true
    use_rmsnorm: true
    wo_shift: false
    use_pos_embed: false
  ckpt:

transport:
  params:
    path_type: 'Linear'
    prediction: 'velocity'
    loss_weight: null
    time_dist_type: 'logit-normal_0_1'


sampler:
  mode: ODE
  params:
    sampling_method: 'euler'
    num_steps: 50
    atol: 1.0e-6
    rtol: 1.0e-3
    reverse: false


guidance:
  method: 'cfg'
  scale: 1.0
  t_min: 0.0
  t_max: 1.0


misc:
  latent_size: 
  num_classes: 
  time_dist_shift_dim: 1492992  # 1536*27*36
  time_dist_shift_base: 4096


training:
  global_seed: 42
  precision: fp32
  epochs: 10
 
  global_batch_size: 1
  grad_accum_steps: 1
  ema_decay: 0.9995
  # ema_decay: 0.9999
  num_workers: 4
  shuffle: True
  log_interval: 1


  ckpt_step_interval: 5000   # 5k

  vis:
    train_depth_every: 1000   # 1k
    val_depth_every: 1000


  clip_grad: 1.0
  optimizer:
    lr: 2.0e-4
    betas: [0.9, 0.95]
    weight_decay: 0.0
  scheduler:
    type: linear
    warmup_epochs: 5
    decay_end_epoch: 10
    base_lr: 2e-4
    final_lr: 2e-5
    warmup_from_zero: false

  guidance:
    lq_drop: 0.1


log:
  result_root_dir: result_train/nips26/260417_multi_view_flux/enc8_dec6_lq2hq_wnoise0.3
  tracker:
    name: wandb
    wandb:
      key: a44758ca07858594065872c389df0962658144f6
      entity: whale03-org
      project: nips26_mvrm_multiview_da3
      
      # 260218
      # msg: 'lqkernel50__ema95__hyp1tar1'
      # msg: 'lqkernel100__ema95__hyp1tar1_cont-ckpt-35k'
      # msg: 'lqkernel100__ema95__hyp1tar1_cont-ckpt-60k'
      msg: 'lqkernel200__ema95__hyp1__flux_ddt_lq2hq-enc8-1536-dec6-3072__lqdrop_01_260420'


data:
  train:
    image_size: 512 
    max_num_input_view: 4
    # max_num_input_view: 1
    # list: [hypersim,]
    list: [hypersim, tartanair,]
    
    hypersim:
      ann_path: metadata_images_split_scene_v1.csv
      hq_root_path: /mnt/dataset1/MV_Restoration/hypersim/data
      lq_kernel_size: [50, 300]
      lq_kernel_intensity: [0.0, 0.3]
      view_selection:
        # [random, near_random, near_camera]
        # strategy: random
        # strategy: near_random
        strategy: near_camera
        expand_ratio: 2
      process_res: 640
      patch_size: 16
    
    tartanair:
      ann_path: 
      hq_root_path: /mnt/dataset1/MV_Restoration/tartanair/data
      lq_kernel_size: [50, 300]
      lq_kernel_intensity: [0.0, 0.3]
      view_selection:
        # [random, near_random]
        # strategy: random
        strategy: near_random 
        expand_ratio: 2
      process_res: 640
      patch_size: 16



  val:
    image_size: 512 
    max_num_input_view: 1
    # list: []
    list: []

    eth3d:
      num_eval_img: 3
      # eval_scene: [courtyard]
      eval_scene: [courtyard,  electro,  facade,  kicker,  office,  playground]
      # eval_scene: [courtyard, delivery_area,  electro,  facade,  kicker,  office,  pipes,  playground,  relief,  relief_2,  terrains]
      ann_path:
      hq_root_path: /mnt/dataset1/MV_Restoration/da3_benchmark_dataset/clean/eth3d
      lq_root_path: /mnt/dataset1/MV_Restoration/da3_benchmark_dataset/cam_blur_300/eth3d
      view_selection:
        strategy: near_random
        expand_ratio: 2
      process_res: 640
      patch_size: 16


mvrm:
  noiselvl: 0.3
  lq_latent_cond: addition    # [addition, concat]
  train:
    # DPT Head input feats = [19, 27, 33, 39]
    extract_feat_layers: [17]
    concat_feat: False
    break_and_return_feat: false
  val:
    restore_feat_layers: [17]
    concat_feat: False 
    skip_and_input_feat: true
    guidance:
      use_cfg: false
      cfg_scale: 1.0
    